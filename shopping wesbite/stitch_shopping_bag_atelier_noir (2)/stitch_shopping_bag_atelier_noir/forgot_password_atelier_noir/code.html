<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 24;
        }
        .stagger-1 { animation: fadeInSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
        .stagger-2 { animation: fadeInSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards; opacity: 0; }
        .stagger-3 { animation: fadeInSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.2s forwards; opacity: 0; }
        .stagger-4 { animation: fadeInSlideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards; opacity: 0; }
        
        @keyframes fadeInSlideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- TopNavBar - Rendered as per Shared Components JSON but suppressed for focused task -->
<!-- (Note: "The "Destination" Rule" suppresses nav for transactional/task-focused screens) -->
<header class="fixed top-0 w-full z-50 bg-white/70 backdrop-blur-[30px] border-b border-stone-200/20">
<div class="flex justify-between items-center w-full px-8 py-6 max-w-[1920px] mx-auto">
<a class="text-xl font-bold tracking-widest text-stone-900 headline" href="#">ATELIER NOIR</a>
<div class="flex items-center gap-6">
<button class="text-stone-900">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</div>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-lg grid grid-cols-1 gap-12">
<!-- Hero Aesthetic Image (Asymmetric Layout) -->
<div class="relative w-full aspect-[4/5] md:aspect-[16/9] overflow-hidden stagger-1 shadow-2xl">
<img alt="Minimalist fashion" class="w-full h-full object-cover" data-alt="High-end minimalist fashion atelier studio with architectural lighting, soft shadows on white fabric, and clean lines" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCKdAZ3OMbfaTi6xdhyZMYs_GpaUmVoMMTy4tQ9U8LuyPMxNDwsYVJDpKjlxso0yJZSJSG_C7IBYQcyHxevpxL01HCih0-vsJ30F_l3XI43nYczqrX04RQFIkjwzWWKE_auTHeZCRgkDVv22ShlWPMflp0OXjSa-PUb_aa3G3905US2iMyzeYnr9Sgw4YRpzMRhIvNypY551p3IPGDBpMdk7-V0HqoIY4hM3wXH5m0hx_DnmHwshO9EYqW17RPTszHWZF7kgt2YipY"/>
<div class="absolute inset-0 bg-black/5"></div>
</div>
<!-- Focused Content Canvas -->
<div class="space-y-8 stagger-2">
<div class="space-y-3">
<h1 class="text-4xl md:text-5xl font-headline font-bold text-stone-900 tracking-tight">Forgot Password</h1>
<p class="text-stone-500 font-body text-sm tracking-wide">Enter your email to receive a recovery link.</p>
</div>
<form class="space-y-6">
<div class="space-y-2 stagger-3">
<label class="block text-[0.6875rem] font-label tracking-[0.1em] uppercase text-stone-400" for="email">Email Address</label>
<div class="relative">
<input class="w-full glass-panel border border-stone-200/50 px-5 py-4 text-stone-900 placeholder-stone-300 focus:outline-none focus:border-stone-900 transition-colors duration-300 rounded-none shadow-sm" id="email" name="email" placeholder="archetype@ateliernoir.com" type="email"/>
</div>
</div>
<div class="stagger-4 flex flex-col gap-4">
<button class="w-full bg-stone-900 text-white py-5 text-[0.6875rem] font-label tracking-[0.2em] uppercase hover:bg-stone-800 transition-all duration-300 active:scale-[0.98] rounded-none" type="submit">
                            Send Link
                        </button>
<div class="flex justify-between items-center pt-2">
<a class="text-[0.6875rem] font-label tracking-widest uppercase text-stone-400 hover:text-stone-900 transition-colors duration-200" href="#">
                                Back to Login
                            </a>
<!-- Muted gold success indicator placeholder (hidden by default) -->
<div class="flex items-center gap-2 opacity-0 pointer-events-none">
<span class="w-2 h-2 rounded-full bg-tertiary"></span>
<span class="text-[0.6875rem] font-label tracking-widest uppercase text-tertiary">Link Sent</span>
</div>
</div>
</div>
</form>
</div>
<!-- Subtle Brand Editorial Detail -->
<div class="stagger-4 border-l border-stone-200 pl-6 py-4">
<p class="text-[0.625rem] font-label tracking-[0.2em] text-stone-400 uppercase leading-relaxed">
                    Security is an art form. <br/>
                    Your data remains encrypted within the archive.
                </p>
</div>
</div>
</main>
<!-- Footer - Rendered as per Shared Components JSON -->
<footer class="w-full border-t border-stone-200 bg-stone-50">
<div class="flex flex-col md:flex-row justify-between items-center w-full px-12 py-10 max-w-[1920px] mx-auto gap-6">
<div class="text-lg font-bold tracking-tighter text-stone-900 headline">ATELIER NOIR</div>
<div class="flex flex-wrap justify-center gap-8">
<a class="text-[0.6875rem] tracking-widest uppercase text-stone-500 hover:text-stone-900 transition-colors duration-200" href="#">Privacy Policy</a>
<a class="text-[0.6875rem] tracking-widest uppercase text-stone-500 hover:text-stone-900 transition-colors duration-200" href="#">Terms of Service</a>
<a class="text-[0.6875rem] tracking-widest uppercase text-stone-500 hover:text-stone-900 transition-colors duration-200" href="#">Shipping &amp; Returns</a>
<a class="text-[0.6875rem] tracking-widest uppercase text-stone-500 hover:text-stone-900 transition-colors duration-200" href="#">Contact</a>
</div>
<div class="text-[0.6875rem] tracking-widest uppercase text-stone-400">
                © 2024 ATELIER NOIR. ALL RIGHTS RESERVED.
            </div>
</div>
</footer>
</body></html>
